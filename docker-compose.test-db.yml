version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nsdc-test-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dalalbull
    ports:
      - "5432:5432"
    volumes:
      - nsdc_postgres_data:/var/lib/postgresql/data

volumes:
  nsdc_postgres_data:
